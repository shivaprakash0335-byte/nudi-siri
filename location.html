<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Verification</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
width:320px;
}

h2{
margin-bottom:10px;
}

button{
background:#007BFF;
border:none;
color:white;
padding:12px 20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#0056b3;
}

#location{
margin-top:15px;
font-size:14px;
}
</style>
</head>

<body>

<div class="card">
<h2>Location Verification</h2>
<p>Please verify your location to continue.</p>

<button onclick="getLocation()">Verify Location</button>

<div id="location"></div>
</div>

<script>

function getLocation(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(showPosition,showError);
}else{
document.getElementById("location").innerHTML="Location not supported.";
}
}

function showPosition(position){
let lat=position.coords.latitude;
let lon=position.coords.longitude;

document.getElementById("location").innerHTML=
"Latitude: "+lat+"<br>Longitude: "+lon+
"<br><br><a href='https://maps.google.com/?q="+lat+","+lon+'" target='_blank'>View on Map</a>";
}

function showError(error){
document.getElementById("location").innerHTML="Location permission denied.";
}

</script>

</body>
</html>
